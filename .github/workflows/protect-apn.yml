name: Proteger módulo APN

on:
  push:
    branches: [main]
    paths:
      - 'controle-processual/index.html'

permissions:
  contents: write

jobs:
  restore-apn-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verificar e restaurar tag do módulo APN
        run: |
          FILE="controle-processual/index.html"
          if ! grep -q 'tempo-apn.js' "$FILE"; then
            echo "Tag do módulo APN ausente — restaurando..."
            sed -i 's|</body>|<script src="tempo-apn.js"></script>\n</body>|' "$FILE"
            git config user.email "noreply@anthropic.com"
            git config user.name "Claude"
            git add "$FILE"
            git commit -m "Restaura módulo APN após merge [auto]"
            git push
            echo "Restaurado com sucesso."
          else
            echo "Módulo APN presente — nenhuma ação necessária."
          fi
