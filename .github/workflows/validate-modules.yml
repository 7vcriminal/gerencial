name: Valida e restaura módulos

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-and-restore:
    runs-on: ubuntu-latest
    name: Verifica módulos em controle-processual/index.html
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Verifica se módulo APN está presente
        id: check
        run: |
          if grep -q 'id="view-apn"' controle-processual/index.html && \
             grep -q 'id="tab-apn"' controle-processual/index.html && \
             grep -q 'STORAGE_APN' controle-processual/index.html; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "✅ Módulo APN presente"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "❌ Módulo APN ausente — iniciando restauração automática"
          fi

      - name: Encontra último commit com módulo APN
        if: steps.check.outputs.ok == 'false'
        id: find-good
        run: |
          GOOD=$(git log --format="%H" | while read hash; do
            if git show "$hash:controle-processual/index.html" 2>/dev/null | grep -q 'id="view-apn"'; then
              echo "$hash"
              break
            fi
          done)
          if [ -z "$GOOD" ]; then
            echo "ERRO: nenhum commit bom encontrado"
            exit 1
          fi
          echo "hash=$GOOD" >> $GITHUB_OUTPUT
          echo "Restaurando a partir de: $GOOD"

      - name: Restaura controle-processual/index.html
        if: steps.check.outputs.ok == 'false'
        run: |
          git checkout ${{ steps.find-good.outputs.hash }} -- controle-processual/index.html
          git config user.name "GitHub Actions [auto-restore]"
          git config user.email "actions@github.com"
          git commit -m "Auto-restaura módulo APN apagado por merge conflict

O merge anterior sobrescreveu controle-processual/index.html com versão
desatualizada que não continha o módulo Tempo de APN. Arquivo restaurado
automaticamente a partir do commit ${{ steps.find-good.outputs.hash }}."
          git push
          echo "✅ Módulo APN restaurado e commitado"
