<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard 7VCRIM</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        /* Base e Cores Judiciárias */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f9; 
            margin: 0; 
            padding: 30px; 
            color: #333;
        }
        
        /* Cabeçalho Institucional */
        .header { 
            background: linear-gradient(135deg, #1a2a6c, #b21f1f); 
            color: white; 
            padding: 30px; 
            border-radius: 12px; 
            text-align: center; 
            margin-bottom: 40px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo-header {
            max-height: 50px;
            margin-bottom: 15px;
            /* Filtro para garantir que o brasão apareça bem sobre o fundo escuro */
            filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.3));
        }

        .header h1 { margin: 10px 0 5px 0; font-size: 2em; letter-spacing: 1px; }
        .header p { margin: 0; font-weight: 300; opacity: 0.9; }

        /* Títulos das Seções */
        h2 { 
            color: #1a2a6c; 
            border-left: 6px solid #b21f1f; 
            padding-left: 15px; 
            margin: 40px 0 20px 0; 
            font-size: 1.5em;
